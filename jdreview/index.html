<!DOCTYPE html>
<html>

<head>

<title>JD Review Generator</title>
<link rel="stylesheet" href="/style.css">

</head>

<body>

<header>
<div class="container nav-container">
<div class="logo">
<img src="/logo.png" class="logo-img">
</div>
</div>
</header>

<section class="hero">
<div class="container">
<h1>JD Review Generator</h1>
<p>Create a client review page for job description refinement</p>
</div>
</section>

<main class="main-content">
<div class="container">

<div class="card">

<label>Client Name</label>
<input id="company">

<label>Job Title</label>
<input id="role">

<label>Current Job Description</label>
<textarea id="currentJD" rows="10"></textarea>

<label>Suggested Job Description</label>
<textarea id="suggestedJD" rows="10"></textarea>

<button class="cta-btn" onclick="generate()">Generate Review Link</button>

<div id="result"></div>

</div>

</div>
</main>

<script>

function generate(){

const company = encodeURIComponent(document.getElementById("company").value)
const role = encodeURIComponent(document.getElementById("role").value)

const currentJD = encodeURIComponent(document.getElementById("currentJD").value)
const suggestedJD = encodeURIComponent(document.getElementById("suggestedJD").value)

const url =
"https://bizgrants.consulting/jdreview/review.html?" +
"company=" + company +
"&role=" + role +
"&current=" + currentJD +
"&suggested=" + suggestedJD

document.getElementById("result").innerHTML =
"<p>Send this link to the client:</p>" +
"<a href='"+url+"' target='_blank'>" + url + "</a>"

}

</script>

</body>
</html>
