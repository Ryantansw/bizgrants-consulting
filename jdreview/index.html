<!DOCTYPE html>
<html>

<head>

<title>JD Review Generator</title>
<link rel="stylesheet" href="/style.css">

</head>

<body>

<header>
<div class="container nav-container">
<div class="logo">
<img src="/logo.png" class="logo-img">
</div>
</div>
</header>

<section class="hero">
<div class="container">
<h1>JD Review Generator</h1>
<p>Create a client review page for job description refinement</p>
</div>
</section>

<main class="main-content">

<div class="container">

<div class="card">

<h2>Project Details</h2>

<label>Client Company</label>
<input id="company">

<label>Job Title</label>
<input id="role">

<label>Staff Name</label>
<input id="staff">

<h2>Current Job Description</h2>
<textarea id="currentJD" rows="12"></textarea>

<h2>Suggested Job Description</h2>
<textarea id="suggestedJD" rows="12"></textarea>

<button class="cta-btn" onclick="generate()">Generate Client Review Link</button>

<div id="result" style="margin-top:20px;"></div>

</div>

</div>

</main>

<script>

function generate(){

const company = document.getElementById("company").value
const role = document.getElementById("role").value
const staff = document.getElementById("staff").value

const current = document.getElementById("currentJD").value
const suggested = document.getElementById("suggestedJD").value

const key = company + "_" + role + "_" + staff

localStorage.setItem(key + "_current", current)
localStorage.setItem(key + "_suggested", suggested)

const url =
"https://bizgrants.consulting/jdreview/review.html?company="
+ encodeURIComponent(company)
+ "&role=" + encodeURIComponent(role)
+ "&staff=" + encodeURIComponent(staff)

document.getElementById("result").innerHTML =
"<p>Send this link to the client:</p>" +
"<a href='"+url+"' target='_blank'>" + url + "</a>"

}

</script>

</body>
</html>
