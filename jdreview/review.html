<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Review</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/style.css">

<style>

.jd-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:2em;
margin-top:2em;
}

.jd-box textarea{
width:100%;
min-height:420px;
padding:1em;
border:1px solid #e3eaf6;
border-radius:6px;
font-family:"Aptos","Segoe UI",Arial,sans-serif;
}

@media(max-width:900px){
.jd-grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<header>
<div class="container nav-container">
<div class="logo">
<img src="/images/logo.png" class="logo-img">
</div>
</div>
</header>

<section class="hero">

<div class="container">

<h1>Job Description Review</h1>

<p id="titleInfo"></p>

</div>

</section>

<main class="main-content">

<div class="container">

<form action="https://formspree.io/f/maqpwndy" method="POST">

<input type="hidden" name="company" id="companyField">
<input type="hidden" name="role" id="roleField">
<input type="hidden" name="staff" id="staffField">

<div class="jd-grid">

<div class="jd-box">

<h2>Current JD</h2>

<textarea id="currentJD" name="current_jd"></textarea>

</div>

<div class="jd-box">

<h2>Suggested JD</h2>

<textarea id="suggestedJD" name="suggested_jd"></textarea>

</div>

</div>

<h2 style="margin-top:2em;">Remarks</h2>

<textarea name="remarks" style="width:100%;min-height:150px;"></textarea>

<br><br>

<button class="cta-btn" type="submit">Submit Review</button>

</form>

</div>

</main>

<script>

const params = new URLSearchParams(window.location.search)

const project = params.get("project")

fetch("/jdreview/projects/" + project + ".json")

.then(res => res.json())

.then(data => {

document.getElementById("titleInfo").innerText =
data.company + " | " + data.role + " | " + data.staff

document.getElementById("companyField").value = data.company
document.getElementById("roleField").value = data.role
document.getElementById("staffField").value = data.staff

document.getElementById("currentJD").value = data.currentJD
document.getElementById("suggestedJD").value = data.suggestedJD

})

</script>

</body>
</html>
